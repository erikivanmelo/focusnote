appId: com.focusnote.app
productName: FocusNote
copyright: Copyright © 2025 FocusNote Team

directories:
  buildResources: build
  output: release
  app: .

files:
  - "dist/**/*"
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme,test,__tests__,tests,example,examples,doc,docs}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,swp,md,log,lock}"
  - "!**/._*"
  - "!**/.git"
  - "!**/.github"
  - "!**/.vscode"
  - "!**/.idea"
  - "!**/src"
  - "!**/test"
  - "!**/tests"

# Configuración de publicación
publish:
  provider: github
  owner: erikivanmelo  # Reemplaza con tu usuario/organización de GitHub
  repo: focusnote
  releaseType: release
  publishAutoUpdate: true

# Platform specific configurations
win:
  target: ["portable"]
  icon: "build/icon.ico"
  publisherName: "FocusNote Team"
  verifyUpdateCodeSignature: false
  
mac:
  category: public.app-category.productivity
  target: ["dmg", "zip"]
  icon: "build/icon.icns"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: "build/entitlements.mac.plist"
  entitlementsInherit: "build/entitlements.mac.plist"

dmg:
  contents:
    - x: 110
      y: 150
      type: file
    - x: 240
      y: 150
      type: link
      path: /Applications

linux:
  target: ["AppImage", "deb"]
  category: "Utility"
  icon: "build/icon.png"
  maintainer: "FocusNote Team"
  desktop:
    Name: "FocusNote"
    Comment: "A minimalistic note-taking app"
    Categories: "Utility;TextEditor;"
    Terminal: false

# Additional resources configuration
extraResources:
  - "resources/**"
  - "!resources/**/*.{map,ts,tsx,js,jsx}"

# DEB package specific configuration
deb:
  depends:
    - libcrypt1
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libat-spi2-core
    - libuuid1
    - libsecret-1-0
    - libappindicator3-1
  packageCategory: "Utility"
  description: "FocusNote is a simple and clean note-taking application."
  icon: "build/icon.png"

# Configuración de actualizaciones automáticas
generateUpdatesFilesForAllChannels: true
