# Application information
appId: com.focusnote.app
productName: FocusNote
copyright: Copyright 2025 FocusNote Team

# Directories configuration
directories:
  output: release
  buildResources: build
  app: .

# Files to include in the build
files:
  - "dist/**/*"
  - "node_modules/**/*"
  - "package.json"
  - "resources/**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/.bin"
  - "!**/node_modules/**/.cache"
  - "!**/node_modules/**/.github"
  - "!**/node_modules/**/.idea"
  - "!**/node_modules/**/.vscode"
  - "!src/**/*"  # Exclude source files, we only want the built files

# ASAR configuration
asar: true

# Publish configuration
publish:
  provider: github
  owner: erikivanmelo
  repo: focusnote
  releaseType: release
  publishAutoUpdate: true

# Platform specific configurations
win:
  target: ["portable"]
  icon: "build/icon.ico"
  publisherName: "FocusNote Team"
  verifyUpdateCodeSignature: false
  
mac:
  category: public.app-category.productivity
  target: ["dmg", "zip"]
  icon: "build/icon.icns"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: "build/entitlements.mac.plist"
  entitlementsInherit: "build/entitlements.mac.plist"

dmg:
  contents:
    - x: 110
      y: 150
      type: file
    - x: 240
      y: 150
      type: link
      path: /Applications

linux:
  target: ["AppImage", "deb"]
  category: "Utility"
  icon: "build/icon.png"
  maintainer: "FocusNote Team"
  desktop:
    Name: "FocusNote"
    Comment: "A minimalistic note-taking app"
    Categories: "Utility;TextEditor;"
    Terminal: false

# Additional resources configuration
extraResources:
  - "resources/**"
  - "!resources/**/*.{map,ts,tsx,js,jsx}"

# DEB package specific configuration
deb:
  depends:
    - libcrypt1
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libat-spi2-core
    - libuuid1
    - libsecret-1-0
    - libappindicator3-1
  packageCategory: "Utility"
  description: "FocusNote is a simple and clean note-taking application."
  icon: "build/icon.png"

# Configuración de actualizaciones automáticas
generateUpdatesFilesForAllChannels: true
