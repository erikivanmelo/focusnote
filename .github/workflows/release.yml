name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Package
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
          publish: always
          build_args: --${{ matrix.platform }} --publish always

      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-${{ matrix.platform }}
          path: release/

      
      - name: Create Release
        if: matrix.platform == 'mac'  # Solo crear el release una vez
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            ## What's Changed
            
            ### New Features
            - Add new features here
            
            ### Bug Fixes
            - Fix various issues
            
            ### Dependencies
            - Update dependencies
          draft: false
          prerelease: false
          files: |
            release/make/*.zip
            release/make/*.dmg
            release/make/*.AppImage
            release/make/*.exe
            release/make/*.deb
            latest.yml
            latest-linux.yml
            latest-mac.yml
